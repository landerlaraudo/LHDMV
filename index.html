<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mind Guide UI</title>
  <style>
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayRoman.ttf") format("truetype"); font-weight: 400; }
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayLight.ttf") format("truetype"); font-weight: 300; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Reg.otf") format("opentype"); font-weight: 400; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Lig.otf") format("opentype"); font-weight: 300; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    .cursor { animation: blink 1.1s step-end infinite; }
    html { background: #fff; }
    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #fff;
      font-family: "Europa", system-ui, sans-serif;
      color: #0a0a0e;
    }
    .phone {
      width: min(100vw, 430px);
      height: 100vh;
      height: 100dvh;
      overflow-y: auto;
      overflow-x: hidden;
      background-color: #ffffff;
      position: relative;
      padding: max(env(safe-area-inset-top), 18px) 16px max(env(safe-area-inset-bottom), 18px);
    }
    .blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
    }
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .island { width: 118px; height: 28px; background: #0a0a0d; border-radius: 14px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2px;
    }
    .date-chip, .icon-chip, .tab, .tile, .metric {
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #0a0a0e; flex-shrink: 0; display: inline-block; }
    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .icon-chip {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #0a0a0e !important;
      border: none !important;
      display: block;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.18s, opacity 0.18s;
    }
    .icon-chip:hover { transform: scale(1.08); }
    .nav-menu {
      position: absolute;
      top: 50px; right: 4px;
      width: 65%;
      bottom: auto;
      height: 55vh;
      z-index: 20;
      border-radius: 28px;
      background: rgba(210, 210, 210, 0.45);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);
      border: 1px solid rgba(255, 255, 255, 0.35);
      padding: 14px 14px 14px;
      display: flex;
      flex-direction: column;
      clip-path: circle(0% at calc(100% - 20px) 0px);
      opacity: 0;
      transition: clip-path 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
      pointer-events: none;
      overflow: hidden;
    }
    .nav-menu::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 90% 10%, rgba(255,255,255,0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 10% 90%, rgba(255,255,255,0.03) 0%, transparent 50%);
      pointer-events: none;
    }
    .nav-menu.open {
      clip-path: circle(150% at calc(100% - 20px) 0px);
      opacity: 1;
      pointer-events: all;
    }
    .nav-menu-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 40px;
    }
    .nav-brand {
      font-family: "NeueHaas", sans-serif;
      font-weight: 100;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }
    .nav-close {
      background: none;
      border: none;
      color: #000;
      font-family: "Europa", sans-serif;
      font-weight: 300;
      font-size: 26px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.18s;
      padding: 0;
      letter-spacing: 0;
    }
    .nav-close:hover { color: #000; }
    .nav-links {
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: flex-start;
      align-items: flex-end;
      gap: 0;
    }
    @keyframes linkIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .nav-link {
      font-family: "NeueHaas", sans-serif;
      font-weight: 300;
      font-size: clamp(26px, 7vw, 36px);
      color: #000;
      text-align: right;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: -0.03em;
      padding: 0;
      border-bottom: none;
      display: flex;
      align-items: baseline;
      gap: 12px;
      transition: color 0.2s;
      opacity: 0;
    }
    .nav-menu.open .nav-link:nth-child(1) { animation: linkIn 0.45s cubic-bezier(0.22,1,0.36,1) 0.18s both; }
    .nav-menu.open .nav-link:nth-child(2) { animation: linkIn 0.45s cubic-bezier(0.22,1,0.36,1) 0.24s both; }
    .nav-menu.open .nav-link:nth-child(3) { animation: linkIn 0.45s cubic-bezier(0.22,1,0.36,1) 0.30s both; }
    .nav-menu.open .nav-link:nth-child(4) { animation: linkIn 0.45s cubic-bezier(0.22,1,0.36,1) 0.36s both; }
    .nav-link:hover { color: #000; }
    .nav-link:last-child { border-bottom: none; }
    .nav-num {
      font-family: "Europa", sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
      padding-bottom: 4px;
    }
    .nav-link-arrow {
      margin-left: auto;
      font-size: 14px;
      color: rgba(0,0,0,0.18);
      transition: transform 0.2s, color 0.2s;
    }
    .nav-link:hover .nav-link-arrow { transform: translate(3px, -3px); color: rgba(0,0,0,0.5); }
    .nav-footer {
      border-top: 1px solid rgba(0,0,0,0.07);
      padding-top: 14px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
    .nav-footer-counter {
      font-family: "NeueHaas", sans-serif;
      font-size: 11px;
      color: rgba(0,0,0,0.30);
    }
    .nav-player {
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      margin-top: 28px;
      margin-bottom: 16px;
      height: 140px;
      background-size: cover;
      background-position: center 25%;
      transition: background-image 0.4s ease, box-shadow 0.6s ease;
      flex-shrink: 0;
    }
    .nav-player-filter {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      transition: background 0.6s ease;
      z-index: 1;
      pointer-events: none;
    }
    .nav-player-inner {
      position: absolute;
      inset: 0;
      z-index: 2;
      padding: 12px 14px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: none;
    }
    .nav-player-info { min-width: 0; }
    .nav-player-name {
      font-family: "NeueHaas", sans-serif;
      font-size: 13px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-player-track {
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-player-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .nav-player-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.12);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-player-btn:hover { background: rgba(255,255,255,0.22); }
    .nav-player-play {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.92);
      color: #0a0a0e;
      font-size: 11px;
      border-color: transparent;
    }
    .nav-player-play:hover { background: #fff; }
    .nav-player-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.15);
      z-index: 3;
    }
    .nav-player-progress {
      height: 100%;
      background: rgba(255,255,255,0.8);
      width: 0%;
      transition: width 0.3s linear;
    }
    .nav-menu-backdrop {
      position: absolute;
      inset: 0;
      z-index: 19;
      display: none;
    }
    .nav-menu-backdrop.open { display: block; }
    .tabs { display: flex; gap: 8px; margin-top: 2px; }
    .tab {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.45);
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .tab:hover:not(.active) { background: rgba(0, 0, 0, 0.08); color: rgba(0,0,0,0.8); }
    .tab.active { background: rgba(0, 0, 0, 0.85); color: #fff; border-color: rgba(0, 0, 0, 0.4); }
    h1 {
      font-family: "NeueHaas", sans-serif;
      font-weight: 300;
      font-size: clamp(34px, 8.4vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 8px 0 2px;
      text-shadow: none;
      margin-top: 10vh;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 5vh;
    }
    .tile { border-radius: 18px; border: 0.2px solid rgba(0,0,0,0.08); padding: 12px; min-height: 112px; position: relative; overflow: hidden; }
    .tile.mind-guide { padding: 0; border-radius: 22px; }
    .tile.mind-guide::before, .tile.mind-guide::after { border-radius: 0; }
    .tile.large {
      min-height: 126px;
      padding: 0;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      border: 9px solid rgba(0, 0, 0, 0.07);
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(26, 26, 30, 0.82)),
        url("songs/all%20the%20stars.jpeg");
      background-size: cover;
      background-position: center top;
      box-shadow:
        0 12px 24px rgba(0, 0, 0, 0.18),
        inset 0 -55px 70px rgba(0, 0, 0, 0.35);
      transition: background-image 0.3s ease, border-color 0.6s ease;
    }
    .title-large-inner {
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(20, 20, 24, 0.45));
    }
    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .author-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      max-width: 154px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 7px 10px;
      overflow: hidden;
    }
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: rgba(0, 0, 0, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }
    .author-meta { min-width: 0; }
    .author-name {
      font-size: 10px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .author-handle {
      margin-top: 2px;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 6px; }
    .action-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.95);
      display: grid;
      place-items: center;
      font-size: 11px;
    }
    .player-bottom {
      background: linear-gradient(180deg, rgba(15, 15, 18, 0));
      padding: 10px 8px 7px;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 6px;
    }
    .bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar > span {
      display: block;
      width: 52%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.95);
    }
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tile h3 { font-family: "NeueHaas", sans-serif; font-weight: 400; font-size: 20px; line-height: 1; margin-bottom: 4px; color: #0a0a0e; }
    .tile p { font-size: 12px; line-height: 1.25; color: rgba(0, 0, 0, 0.55); max-width: 90%; }
    .music-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; align-items: center; gap: 8px; }
    .circle-btn {
      width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.15); color: #fff; display: grid; place-items: center; cursor: pointer;
      font-size: 10px;
    }
    .play {
      width: 28px;
      height: 28px;
      background: #fff;
      color: #1c1e2c;
      border-color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
    }
    .progress { flex: 1; height: 4px; border-radius: 999px; background: rgba(255, 255, 255, 0.2); overflow: hidden; }
    .progress > span { display: block; width: 45%; height: 100%; background: #fff; }
    .mind-guide {
      display: flex;
      align-items: flex-end;
      min-height: 126px;
      border: 9px solid rgba(0, 0, 0, 0.07);
      border-radius: 34px;
      background: none;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .mind-guide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url(splash.jpg) center bottom / cover no-repeat;
      z-index: 0;
    }
    .mind-guide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 65%);
      z-index: 1;
    }
    .mind-guide-content {
      position: relative;
      z-index: 2;
      padding: 10px;
    }
    .mind-guide strong { display: block; font-size: 17px; font-family: "NeueHaas", sans-serif; color: #fff; }
    .reflection::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url(links/DSC04177.JPG);
      background-size: cover;
      background-position: center;
      border-radius: inherit;
      opacity: 0.55;
      pointer-events: none;
    }
    .metric-row { display: flex; gap: 10px; }
    .metric {
      flex: 1;
      min-height: 80px;
      border-radius: 16px;
      padding: 10px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 7px;
    }
    .ring {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.12);
      border-top-color: #0a0a0e;
      display: grid; place-items: center;
      font-size: 9px;
      color: rgba(0,0,0,0.7);
    }
    .metric label { font-size: 11px; color: rgba(0, 0, 0, 0.55); }
    .fab {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: fit-content;
      height: auto;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(0, 0, 0, 0.10);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
    }
    .song-filter {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      transition: background 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }
    .full-square {
      grid-column: 1 / -1;
      aspect-ratio: 3 / 2;
      min-height: unset;
      padding: 0;
      border: 9px solid rgba(0, 0, 0, 0.07);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }
    .full-square::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url(links/gallery/100.jpg) center center / cover no-repeat;
      z-index: 0;
    }
    .full-square-content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 14px 16px;
    }
    .full-square-text strong {
      display: block;
      font-family: "NeueHaas", sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #fff;
      line-height: 1.2;
    }
    .full-square-text span {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.62);
      margin-top: 1px;
    }
    .full-square-btn {
      width: 50%;
      padding: 9px 0;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: background 0.18s;
    }
    .full-square-btn:hover { background: rgba(255,255,255,0.25); }
    .full-square::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 60%);
      z-index: 1;
    }
    .cal-overlay {
      position: absolute;
      inset: 0;
      z-index: 55;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .cal-overlay.open { display: flex; }
    .cal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .cal-panel {
      position: relative;
      width: 100%;
      max-height: 82vh;
      overflow-y: auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 20px 50px rgba(0,0,0,0.14);
      animation: panelIn 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .cal-title {
      font-family: "NeueHaas", sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: #0a0a0e;
      letter-spacing: -0.01em;
    }
    .cal-nav {
      background: none;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 50%;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 13px;
      color: #0a0a0e;
      display: grid;
      place-items: center;
      transition: background 0.15s;
    }
    .cal-nav:hover { background: rgba(0,0,0,0.06); }
    .cal-weekdays, .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-weekdays { margin-bottom: 6px; }
    .cal-weekday {
      text-align: center;
      font-size: 9px;
      color: rgba(0,0,0,0.30);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 11px;
      color: rgba(0,0,0,0.65);
      position: relative;
      cursor: default;
      gap: 2px;
      transition: background 0.15s;
    }
    .cal-day.other-month { color: rgba(0,0,0,0.18); }
    .cal-day.today { background: rgba(0,0,0,0.07); color: #0a0a0e; font-weight: 500; }
    .cal-day.has-moment { cursor: pointer; }
    .cal-day.has-moment:hover { background: rgba(0,0,0,0.06); }
    .cal-day.selected { background: #0a0a0e; color: #fff; }
    .cal-day.selected .cal-dot { background: #fff; }
    .cal-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #e07050;
      flex-shrink: 0;
    }
    .cal-preview {
      margin-top: 14px;
      display: none;
    }
    .cal-preview.show { display: block; }

    let calYear, calMonth, calSelected = null;

    function toKey(y, m, d) {
      return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    }

    function renderCal(year, month) {
      calYear = year; calMonth = month;
      calTitle.textContent = `${MONTHS_ES[month]} ${year}`;
      calDays.innerHTML = "";
      calPreview.classList.remove("show");
      calSelected = null;

      const firstDay = new Date(year, month, 1).getDay();
      const offset = firstDay === 0 ? 6 : firstDay - 1;
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrev  = new Date(year, month, 0).getDate();
      const today = new Date();

      for (let i = 0; i < offset; i++) {
        const d = document.createElement("button");
        d.className = "cal-day other-month";
        d.textContent = daysInPrev - offset + 1 + i;
        calDays.appendChild(d);
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const key = toKey(year, month, day);
        const d = document.createElement("button");
        d.className = "cal-day";
        if (today.getFullYear()===year && today.getMonth()===month && today.getDate()===day)
          d.classList.add("today");
        if (specialDates[key]) {
          d.classList.add("has-moment");
          const dot = document.createElement("span");
          dot.className = "cal-dot";
          d.appendChild(document.createTextNode(day));
          d.appendChild(dot);
          d.addEventListener("click", () => showMoment(key, d));
        } else {
          d.textContent = day;
        }
        calDays.appendChild(d);
      }

      const total = offset + daysInMonth;
      const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
      for (let i = 1; i <= remaining; i++) {
        const d = document.createElement("button");
        d.className = "cal-day other-month";
        d.textContent = i;
        calDays.appendChild(d);
      }
    }

    const calHeights = [150, 200, 175, 140, 210, 165];

      if (calSelected) calSelected.classList.remove("selected");
      calSelected = dayEl;
      dayEl.classList.add("selected");
      const moments = specialDates[key];
      const MONTHS_SHORT = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      const [y,mo,d] = key.split("-");
      const dateStr = `${parseInt(d)} ${MONTHS_SHORT[parseInt(mo)-1]} ${y}`;
      const pins = moments.map((m, i) => {
        const h = calHeights[i % calHeights.length];
        const filename = m.src.split("/").pop();
        return `<a class="cal-pin" href="gallery.html?photo=${filename}" style="--h:${h}px">
          <img src="${m.src}" alt="${m.place}" loading="lazy" />
          <div class="cal-pin-info"><div class="cal-pin-place">${m.place}</div></div>
        </a>`;
      }).join("");
      // Agrupa por texto único, tomando el primer lugar de cada grupo
      const textGroups = [];
      const seen = new Set();
      for (const m of moments) {
        if (!m.text || m.text === "Por definir") continue;
        if (!seen.has(m.text)) {
          seen.add(m.text);
          textGroups.push({ text: m.text, place: m.place !== "Por definir" ? m.place : "" });
        }
      }
      const textsHtml = textGroups.length
        ? `<div class="cal-day-texts">${textGroups.map(g => `
            <div class="cal-day-text-block">
              <div class="cal-day-text-date">${dateStr}</div>
              ${g.place ? `<div class="cal-day-text-place">${g.place}</div>` : ""}
              <div class="cal-day-text-body">${g.text}</div>
            </div>`).join("")}</div>`
        : "";

      calPreview.innerHTML = `
        <div class="cal-preview-label">${moments.length} momento${moments.length>1?"s":""} · ${dateStr}</div>
        <div class="cal-gallery">${pins}</div>
        ${textsHtml}`;
      calPreview.classList.add("show");
    }

    const phoneEl = document.querySelector(".phone");

    function openCal() {
      const now = new Date();
      renderCal(now.getFullYear(), now.getMonth());
      calOverlay.classList.add("open");
      phoneEl.style.overflow = "hidden";
    }
    function closeCal() {
      calOverlay.classList.remove("open");
      phoneEl.style.overflow = "";
    }

    calBtn.addEventListener("click", openCal);
    calBackdrop.addEventListener("click", closeCal);
    document.getElementById("calPrev").addEventListener("click", () => {
      calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCal(calYear, calMonth);
    });
    document.getElementById("calNext").addEventListener("click", () => {
      calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCal(calYear, calMonth);
    });

    // Tiempo transcurrido desde el inicio
    (function() {
      const start = new Date(2025, 11, 23); // 23 Dic 2025
      const now = new Date();
      let months = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
      const dayStart = new Date(start.getFullYear(), start.getMonth() + months, start.getDate());
      if (dayStart > now) months--;
      const baseDate = new Date(start.getFullYear(), start.getMonth() + months, start.getDate());
      const days = Math.floor((now - baseDate) / (1000 * 60 * 60 * 24));
      let label = "";
      if (months > 0) label += `${months} mes${months > 1 ? "es" : ""}`;
      if (months > 0 && days > 0) label += ` y `;
      if (days > 0 || months === 0) label += `${days} día${days !== 1 ? "s" : ""}`;
      dateLabel.textContent = label;
      const navCounter = document.getElementById("navCounter");
      if (navCounter) navCounter.textContent = label;
    })();

    const menuBtn = document.getElementById("menuBtn");
    const navMenu = document.getElementById("navMenu");
    const navClose = document.getElementById("navClose");
    const navBackdrop = document.getElementById("navBackdrop");

    function openNav() {
      navMenu.classList.add("open");
      navBackdrop.classList.add("open");
    }
    function closeNav() {
      navMenu.classList.remove("open");
      navBackdrop.classList.remove("open");
    }

    menuBtn.addEventListener("click", openNav);
    navClose.addEventListener("click", closeNav);
    navBackdrop.addEventListener("click", closeNav);

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelector(".tab.active")?.classList.remove("active");
        tab.classList.add("active");
      });
    });

    const songs = [
      {
        src: "songs/All The Stars.mp3",
        title: "All The Stars",
        artist: "Kendrick Lamar",
        cover: "songs/all the stars.jpeg",
        filter: "rgba(90, 40, 180, 0.55)"
      },
      {
        src: "songs/Cinnamon Girl.mp3",
        title: "Cinnamon Girl",
        artist: "Lana Del Rey",
        cover: "songs/Cinnamon Girl.jpg",
        filter: "rgba(200, 100, 30, 0.50)"
      },
      {
        src: "songs/Say Yes To Heaven.mp3",
        title: "Say Yes To Heaven",
        artist: "Lana Del Rey",
        cover: "songs/Say Yes To Heaven.webp",
        filter: "rgba(40, 90, 210, 0.50)"
      },
      {
        src: "songs/The Cranberries - Linger.mp3",
        title: "Linger",
        artist: "The Cranberries",
        cover: "songs/Linger.jpg",
        filter: "rgba(30, 140, 80, 0.50)"
      }
    ];

    const audio = new Audio();
    let currentIndex = Math.floor(Math.random() * songs.length);

    const playerCard = document.getElementById("playerCard");
    const songFilter = document.getElementById("songFilter");
    const navPlayer        = document.getElementById("navPlayer");
    const navPlayerFilter  = document.getElementById("navPlayerFilter");
    const navAuthorName    = document.getElementById("navAuthorName");
    const navTrackName     = document.getElementById("navTrackName");
    const navPlayBtn       = document.getElementById("navPlayBtn");
    const navPrevBtn       = document.getElementById("navPrevBtn");
    const navNextBtn       = document.getElementById("navNextBtn");
    const navProgressFill  = document.getElementById("navProgressFill");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const currentTimeEl = document.getElementById("currentTime");
    const remainingTimeEl = document.getElementById("remainingTime");
    const progressFill = document.getElementById("progressFill");
    const authorName = document.getElementById("authorName");
    const trackName = document.getElementById("trackName");
    const musicOverlay = document.getElementById("musicOverlay");
    const overlayBackdrop = document.getElementById("overlayBackdrop");
    const songList = document.getElementById("songList");

    function extractColor(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = 20; canvas.height = 20;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 20, 20);
            const d = ctx.getImageData(0, 0, 20, 20).data;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
            const n = d.length / 4;
            resolve(`rgba(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)},0.55)`);
          } catch (e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function loadSong(index, autoplay = false) {
      currentIndex = (index + songs.length) % songs.length;
      const song = songs[currentIndex];
      audio.src = encodeURI(song.src);
      authorName.textContent = song.artist;
      trackName.textContent = `@${song.title.toLowerCase().replace(/\s+/g, "")}`;
      const bgImage = `linear-gradient(180deg, rgba(255,255,255,0.09), rgba(26,26,30,0.82)), url("${encodeURI(song.cover)}")`;
      playerCard.style.backgroundImage = bgImage;
      songFilter.style.background = song.filter;
      navAuthorName.textContent = song.artist;
      navTrackName.textContent = `@${song.title.toLowerCase().replace(/\s+/g,"")}`;
      navPlayer.style.backgroundImage = bgImage;
      navPlayerFilter.style.background = song.filter;
      currentTimeEl.textContent = "0:00";
      remainingTimeEl.textContent = "-0:00";
      progressFill.style.width = "0%";
      renderSongList();
      extractColor(encodeURI(song.cover)).then(color => {
        if (color) playerCard.style.borderColor = color;
      });
      const shadowColor = song.filter.replace(/[\d.]+\)$/, "0.25)");
      playerCard.style.boxShadow = `0 12px 28px ${shadowColor}, inset 0 -55px 70px rgba(0,0,0,0.35)`;
      if (autoplay) {
        audio.play().catch(() => {});
      }
      updatePlayButton();
    }

    function updatePlayButton() {
      const icon = (audio.paused ? "▶" : "⏸") + "\uFE0E";
      playBtn.textContent = icon;
      navPlayBtn.textContent = icon;
    }

    function togglePlay() {
      if (!audio.src) loadSong(currentIndex, false);
      if (audio.paused) {
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
      updatePlayButton();
    }

    function nextSong(autoplay = true) {
      loadSong(currentIndex + 1, autoplay);
    }

    function prevSong(autoplay = true) {
      loadSong(currentIndex - 1, autoplay);
    }

    function glassGradient(filterColor) {
      const m = filterColor.match(/rgba\((\d+),\s*(\d+),\s*(\d+)/);
      if (!m) return "rgba(255,255,255,0.18)";
      const [r, g, b] = m.slice(1).map(Number);
      return [
        `radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.55) 0%, transparent 60%)`,
        `radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.40) 0%, transparent 55%)`,
        `radial-gradient(ellipse at 65% 15%, rgba(${r},${g},${b},0.22) 0%, transparent 50%)`,
        `radial-gradient(ellipse at 30% 85%, rgba(${r},${g},${b},0.15) 0%, transparent 45%)`,
      ].join(", ");
    }

    function renderSongList() {
      songList.innerHTML = "";
      songs.forEach((song, index) => {
        const item = document.createElement("button");
        item.className = `song-item${index === currentIndex ? " active" : ""}`;
        item.style.background = glassGradient(song.filter);
        item.innerHTML = `<div class="song-cover" style="background-image:url('${encodeURI(song.cover)}')"></div><div class="song-text"><div class="song-title">${song.title}</div><div class="song-artist">${song.artist}</div></div>`;
        item.addEventListener("click", () => {
          loadSong(index, true);
          closeOverlay();
        });
        songList.appendChild(item);
      });
    }

    function openOverlay() {
      musicOverlay.classList.add("open");
    }

    function closeOverlay() {
      musicOverlay.classList.remove("open");
    }

    playerCard.addEventListener("click", openOverlay);
    overlayBackdrop.addEventListener("click", closeOverlay);
    playBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      togglePlay();
    });
    nextBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      nextSong(true);
    });
    prevBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      prevSong(true);
    });

    audio.addEventListener("timeupdate", () => {
      const current = audio.currentTime || 0;
      const duration = audio.duration || 0;
      currentTimeEl.textContent = formatTime(current);
      remainingTimeEl.textContent = `-${formatTime(duration - current)}`;
      const progress = duration > 0 ? (current / duration) * 100 : 0;
      progressFill.style.width = `${progress}%`;
      navProgressFill.style.width = `${progress}%`;
    });
    audio.addEventListener("play", updatePlayButton);
    audio.addEventListener("pause", updatePlayButton);
    audio.addEventListener("ended", () => nextSong(true));

    navPlayBtn.addEventListener("click", togglePlay);
    navPrevBtn.addEventListener("click", () => prevSong(true));
    navNextBtn.addEventListener("click", () => nextSong(true));

    loadSong(currentIndex, false);

    const mindGuideEl = document.querySelector(".mind-guide");
    const fullSquareEl = document.querySelector(".full-square");

    extractColor("splash.jpg").then(color => {
      if (color) {
        mindGuideEl.style.borderColor = color;
        const c = color.replace(/[\d.]+\)$/, "0.30)");
        mindGuideEl.style.boxShadow = `0 12px 28px ${c}`;
      }
    });

    extractColor("links/gallery/7.jpg").then(color => {
      if (color) {
        fullSquareEl.style.borderColor = color.replace(/[\d.]+\)$/, "0.18)");
        const c = color.replace(/[\d.]+\)$/, "0.30)");
        fullSquareEl.style.boxShadow = `0 12px 28px ${c}`;
      }
    });
  </script>
</body>
</html>
