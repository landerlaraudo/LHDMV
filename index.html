<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mind Guide UI</title>
  <style>
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayRoman.ttf") format("truetype"); font-weight: 400; }
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayLight.ttf") format("truetype"); font-weight: 300; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Reg.otf") format("opentype"); font-weight: 400; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Lig.otf") format("opentype"); font-weight: 300; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111220;
      font-family: "Europa", system-ui, sans-serif;
      color: #fff;
    }
    .phone {
      width: min(100vw, 430px);
      height: min(100vh, 900px);
      overflow: hidden;
      background-color: black;
      position: relative;
      padding: max(env(safe-area-inset-top), 18px) 16px max(env(safe-area-inset-bottom), 18px);
    }
    .blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
    }
    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .island { width: 118px; height: 28px; background: #0a0a0d; border-radius: 14px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2px;
    }
    .date-chip, .icon-chip, .tab, .tile, .metric {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .icon-chip {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }
    .tabs { display: flex; gap: 8px; margin-top: 2px; }
    .tab {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      white-space: nowrap;
    }
    .tab.active { background: rgba(255, 255, 255, 0.9); color: #20202b; }
    h1 {
      font-family: "NeueHaas", sans-serif;
      font-weight: 300;
      font-size: clamp(34px, 8.4vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 8px 0 2px;
      text-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      margin-top: 10vh;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 5vh;
    }
    .tile { border-radius: 18px; border: 0.2px solid white; ; padding: 12px; min-height: 112px; position: relative; overflow: hidden; }
    .tile.large {
      min-height: 126px;
      padding: 0;
      aspect-ratio: 1 / 1;
      border-radius: 34px;
      border: 9px solid rgba(25, 25, 28, 0.8);
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(26, 26, 30, 0.82)),
        url("songs/all%20the%20stars.jpeg");
      background-size: cover;
      background-position: center;
      box-shadow:
        0 24px 38px rgba(0, 0, 0, 0.4),
        inset 0 -55px 70px rgba(0, 0, 0, 0.52);
      transition: background-image 0.3s ease;
    }
    .title-large-inner {
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(20, 20, 24, 0.45));
      border-radius: 24px;
    }
    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .author-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      max-width: 154px;
      background: rgba(255, 143, 90, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      padding: 4px;
      overflow: hidden;
    }
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: rgba(255, 143, 90, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }
    .author-meta { min-width: 0; }
    .author-name {
      font-size: 11px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .author-handle {
      margin-top: 2px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.67);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 6px; }
    .action-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 143, 90, 0.24);;
      color: rgba(255, 255, 255, 0.95);
      display: grid;
      place-items: center;
      font-size: 11px;
    }
    .player-bottom {
      background: linear-gradient(180deg, rgba(15, 15, 18, 0));
      border-radius: 16px;
      padding: 10px 8px 7px;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 6px;
    }
    .bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar > span {
      display: block;
      width: 52%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.95);
    }
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tile h3 { font-family: "NeueHaas", sans-serif; font-weight: 400; font-size: 20px; line-height: 1; margin-bottom: 4px; }
    .tile p { font-size: 12px; line-height: 1.25; color: rgba(255, 255, 255, 0.82); max-width: 90%; }
    .music-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; align-items: center; gap: 8px; }
    .circle-btn {
      width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.15); color: #fff; display: grid; place-items: center; cursor: pointer;
      font-size: 10px;
    }
    .play {
      width: 28px;
      height: 28px;
      background: #fff;
      color: #1c1e2c;
      border-color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
    }
    .progress { flex: 1; height: 4px; border-radius: 999px; background: rgba(255, 255, 255, 0.2); overflow: hidden; }
    .progress > span { display: block; width: 45%; height: 100%; background: #fff; }
    .mind-guide {
      display: flex;
      align-items: end;
      gap: 10px;
      min-height: 126px;
      border: 9px solid rgba(25, 25, 28, 0.8);
      border-radius: 34px;
      background-image: url(/splash.jpg);
      background-size: cover;
      background-position: bottom;
    }
    .mind-guide strong { display: block; font-size: 17px; font-family: "NeueHaas", sans-serif; }
    .mind-guide small { display: block; font-size: 11px; color: rgba(255, 255, 255, 0.65); margin-top: 2px; }
    .reflection::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url(/links/DSC04177.JPG);
      background-size: cover;
      pointer-events: none;
    }
    .metric-row { display: flex; gap: 10px; }
    .metric {
      flex: 1;
      min-height: 80px;
      border-radius: 16px;
      padding: 10px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 7px;
    }
    .ring {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffb58d;
      display: grid; place-items: center;
      font-size: 9px;
    }
    .metric label { font-size: 11px; color: rgba(255, 255, 255, 0.85); }
    .fab {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: fit-content;
      height: auto;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(255, 143, 90, 0.24);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
    }
    .music-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: flex-end;
    }
    .music-overlay.open { display: flex; }
    .music-overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .music-panel {
      position: relative;
      width: 100%;
      max-height: 62%;
      border-radius: 22px 22px 0 0;
      background: rgba(20, 20, 24, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 14px;
      overflow: auto;
    }
    .music-panel-title {
      font-family: "NeueHaas", sans-serif;
      font-size: 19px;
      margin-bottom: 10px;
    }
    .song-list { display: grid; gap: 8px; }
    .song-item {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      padding: 10px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .song-item.active {
      background: rgba(255, 143, 90, 0.22);
      border-color: rgba(255, 255, 255, 0.24);
    }
    .song-title {
      font-size: 13px;
      font-family: "NeueHaas", sans-serif;
    }
    .song-artist {
      margin-top: 2px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
    }
    .song-cover {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex: 0 0 auto;
    }
    .song-text { min-width: 0; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="blur"></div>
    <section class="app">
      <header class="top">
        <div class="date-chip">
          <span>📅</span>
          <span>18 Jan, 2026</span>
        </div>
        <button class="icon-chip" aria-label="Search">⌕</button>
      </header>

      <nav class="tabs">
        <button class="tab active">Your dairy</button>
        <button class="tab">Notes</button>
        <button class="tab">To Do list</button>
        <button class="tab">For anxiety</button>
      </nav>

      <h1>I’m giving my mind<br />some space... |</h1>

      <section class="grid">
        <article class="tile title large" id="playerCard">
          <div class="title-large-inner">
            <div class="player-top">
              <div class="author-pill">
                <div class="avatar"></div>
                <div class="author-meta">
                  <div class="author-name" id="authorName">Kendrick Lamar</div>
                  <div class="author-handle" id="trackName">@allthestars</div>
                </div>
              </div>
              <div class="top-actions">
                <button class="action-btn" aria-label="Share">⤴</button>
                <button class="action-btn" aria-label="Like">♥</button>
              </div>
            </div>
            <div class="player-bottom">
              <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="remainingTime">-0:00</span>
              </div>
              <div class="bar"><span id="progressFill"></span></div>
              <div class="player-controls">
                <button class="circle-btn" id="prevBtn" aria-label="Prev">⏮</button>
                <button class="circle-btn play" id="playBtn" aria-label="Play">▶</button>
                <button class="circle-btn" id="nextBtn" aria-label="Next">⏭</button>
              </div>
            </div>
          </div>
        </article>

        <article class="tile mind-guide">
          <div class="orb"></div>
          <div>
            <strong>Mind Guide</strong>
            <small>Helping you feel calm</small>
          </div>
        </article>

        <div class="metric-row">
          <article class="metric">
            <div class="ring">64%</div>
            <label>Mind clarity</label>
          </article>
          <article class="metric">
            <div class="ring">15%</div>
            <label>Stress level</label>
          </article>
        </div>

        <article class="tile reflection">
          <h3>Today's reflection</h3>
          <p>What are you holding onto that you could gently release?</p>
          <button class="fab" aria-label="Write">Ver Viajes</button>
        </article>
      </section>
    </section>

    <section class="music-overlay" id="musicOverlay">
      <div class="music-overlay-backdrop" id="overlayBackdrop"></div>
      <div class="music-panel">
        <h2 class="music-panel-title">Songs</h2>
        <div class="song-list" id="songList"></div>
      </div>
    </section>
  </main>
  <script>
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelector(".tab.active")?.classList.remove("active");
        tab.classList.add("active");
      });
    });

    const songs = [
      {
        src: "songs/All The Stars.mp3",
        title: "All The Stars",
        artist: "Kendrick Lamar",
        cover: "songs/all the stars.jpeg"
      },
      {
        src: "songs/Cinnamon Girl.mp3",
        title: "Cinnamon Girl",
        artist: "Lana Del Rey",
        cover: "songs/Cinnamon Girl.jpg"
      },
      {
        src: "songs/Say Yes To Heaven.mp3",
        title: "Say Yes To Heaven",
        artist: "Lana Del Rey",
        cover: "songs/Say Yes To Heaven.webp"
      },
      {
        src: "songs/The Cranberries - Linger.mp3",
        title: "Linger",
        artist: "The Cranberries",
        cover: "songs/Linger.jpg"
      }
    ];

    const audio = new Audio();
    let currentIndex = 0;

    const playerCard = document.getElementById("playerCard");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const currentTimeEl = document.getElementById("currentTime");
    const remainingTimeEl = document.getElementById("remainingTime");
    const progressFill = document.getElementById("progressFill");
    const authorName = document.getElementById("authorName");
    const trackName = document.getElementById("trackName");
    const musicOverlay = document.getElementById("musicOverlay");
    const overlayBackdrop = document.getElementById("overlayBackdrop");
    const songList = document.getElementById("songList");

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function loadSong(index, autoplay = false) {
      currentIndex = (index + songs.length) % songs.length;
      const song = songs[currentIndex];
      audio.src = encodeURI(song.src);
      authorName.textContent = song.artist;
      trackName.textContent = `@${song.title.toLowerCase().replace(/\s+/g, "")}`;
      playerCard.style.backgroundImage = `linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(26, 26, 30, 0.82)), url("${encodeURI(song.cover)}")`;
      currentTimeEl.textContent = "0:00";
      remainingTimeEl.textContent = "-0:00";
      progressFill.style.width = "0%";
      renderSongList();
      if (autoplay) {
        audio.play().catch(() => {});
      }
      updatePlayButton();
    }

    function updatePlayButton() {
      playBtn.textContent = audio.paused ? "▶" : "⏸";
    }

    function togglePlay() {
      if (!audio.src) loadSong(currentIndex, false);
      if (audio.paused) {
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
      updatePlayButton();
    }

    function nextSong(autoplay = true) {
      loadSong(currentIndex + 1, autoplay);
    }

    function prevSong(autoplay = true) {
      loadSong(currentIndex - 1, autoplay);
    }

    function renderSongList() {
      songList.innerHTML = "";
      songs.forEach((song, index) => {
        const item = document.createElement("button");
        item.className = `song-item${index === currentIndex ? " active" : ""}`;
        item.innerHTML = `<div class="song-cover" style="background-image:url('${encodeURI(song.cover)}')"></div><div class="song-text"><div class="song-title">${song.title}</div><div class="song-artist">${song.artist}</div></div>`;
        item.addEventListener("click", () => {
          loadSong(index, true);
          closeOverlay();
        });
        songList.appendChild(item);
      });
    }

    function openOverlay() {
      musicOverlay.classList.add("open");
    }

    function closeOverlay() {
      musicOverlay.classList.remove("open");
    }

    playerCard.addEventListener("click", openOverlay);
    overlayBackdrop.addEventListener("click", closeOverlay);
    playBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      togglePlay();
    });
    nextBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      nextSong(true);
    });
    prevBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      prevSong(true);
    });

    audio.addEventListener("timeupdate", () => {
      const current = audio.currentTime || 0;
      const duration = audio.duration || 0;
      currentTimeEl.textContent = formatTime(current);
      remainingTimeEl.textContent = `-${formatTime(duration - current)}`;
      const progress = duration > 0 ? (current / duration) * 100 : 0;
      progressFill.style.width = `${progress}%`;
    });
    audio.addEventListener("play", updatePlayButton);
    audio.addEventListener("pause", updatePlayButton);
    audio.addEventListener("ended", () => nextSong(true));

    loadSong(0, false);
  </script>
</body>
</html>
