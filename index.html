<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mind Guide UI</title>
  <style>
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayRoman.ttf") format("truetype"); font-weight: 400; }
    @font-face { font-family: "NeueHaas"; src: url("fonts/NeueHaasDisplayLight.ttf") format("truetype"); font-weight: 300; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Reg.otf") format("opentype"); font-weight: 400; }
    @font-face { font-family: "Europa"; src: url("fonts/EuropaGroteskSH-Lig.otf") format("opentype"); font-weight: 300; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }
    .cursor { animation: blink 1.1s step-end infinite; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f0f0f0;
      font-family: "Europa", system-ui, sans-serif;
      color: #0a0a0e;
    }
    .phone {
      width: min(100vw, 430px);
      height: min(100vh, 900px);
      overflow-y: auto;
      overflow-x: hidden;
      background-color: #ffffff;
      position: relative;
      padding: max(env(safe-area-inset-top), 18px) 16px max(env(safe-area-inset-bottom), 18px);
    }
    .blur {
      position: absolute;
      inset: 0;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
    }
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .island { width: 118px; height: 28px; background: #0a0a0d; border-radius: 14px; }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2px;
    }
    .date-chip, .icon-chip, .tab, .tile, .metric {
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #0a0a0e; flex-shrink: 0; display: inline-block; }
    .date-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .icon-chip {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #0a0a0e !important;
      border: none !important;
      display: block;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.18s, opacity 0.18s;
    }
    .icon-chip:hover { transform: scale(1.08); }
    .nav-menu {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80%;
      z-index: 20;
      border-radius: 0 0 28px 28px;
      background: rgba(250, 250, 252, 0.98);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: max(env(safe-area-inset-top), 18px) 20px 28px;
      display: flex;
      flex-direction: column;
      clip-path: circle(0% at calc(100% - 22px) 24px);
      opacity: 0;
      transition: clip-path 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s ease;
      pointer-events: none;
    }
    .nav-menu.open {
      clip-path: circle(150% at calc(100% - 22px) 24px);
      opacity: 1;
      pointer-events: all;
    }
    .nav-menu-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 32px;
    }
    .nav-close {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.10);
      color: #0a0a0e;
      display: grid;
      place-items: center;
      font-size: 14px;
      cursor: pointer;
    }
    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .nav-link {
      font-family: "NeueHaas", sans-serif;
      font-weight: 300;
      font-size: clamp(28px, 7vw, 38px);
      color: rgba(0,0,0,0.65);
      text-decoration: none;
      letter-spacing: -0.02em;
      padding: 8px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      transition: color 0.18s, padding-left 0.22s;
      display: block;
    }
    .nav-link:hover { color: #0a0a0e; padding-left: 6px; }
    .nav-menu-backdrop {
      position: absolute;
      inset: 0;
      z-index: 19;
      display: none;
    }
    .nav-menu-backdrop.open { display: block; }
    .tabs { display: flex; gap: 8px; margin-top: 2px; }
    .tab {
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      color: rgba(0, 0, 0, 0.45);
      white-space: nowrap;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }
    .tab:hover:not(.active) { background: rgba(0, 0, 0, 0.08); color: rgba(0,0,0,0.8); }
    .tab.active { background: rgba(0, 0, 0, 0.85); color: #fff; border-color: rgba(0, 0, 0, 0.4); }
    h1 {
      font-family: "NeueHaas", sans-serif;
      font-weight: 300;
      font-size: clamp(34px, 8.4vw, 52px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 8px 0 2px;
      text-shadow: none;
      margin-top: 10vh;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 10px;
      margin-top: 5vh;
    }
    .tile { border-radius: 18px; border: 0.2px solid rgba(0,0,0,0.08); padding: 12px; min-height: 112px; position: relative; overflow: hidden; }
    .tile.mind-guide { padding: 0; border-radius: 22px; }
    .tile.mind-guide::before, .tile.mind-guide::after { border-radius: 0; }
    .tile.large {
      min-height: 126px;
      padding: 0;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      border: 9px solid rgba(0, 0, 0, 0.07);
      background-image:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(26, 26, 30, 0.82)),
        url("songs/all%20the%20stars.jpeg");
      background-size: cover;
      background-position: center;
      box-shadow:
        0 24px 38px rgba(0, 0, 0, 0.4),
        inset 0 -55px 70px rgba(0, 0, 0, 0.52);
      transition: background-image 0.3s ease, border-color 0.6s ease;
    }
    .title-large-inner {
      width: 100%;
      height: 100%;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(20, 20, 24, 0.45));
    }
    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .author-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      max-width: 154px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 7px 10px;
      overflow: hidden;
    }
    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: rgba(0, 0, 0, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }
    .author-meta { min-width: 0; }
    .author-name {
      font-size: 10px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .author-handle {
      margin-top: 2px;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-actions { display: flex; gap: 6px; }
    .action-btn {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.95);
      display: grid;
      place-items: center;
      font-size: 11px;
    }
    .player-bottom {
      background: linear-gradient(180deg, rgba(15, 15, 18, 0));
      padding: 10px 8px 7px;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 6px;
    }
    .bar {
      width: 100%;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .bar > span {
      display: block;
      width: 52%;
      height: 100%;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.95);
    }
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .tile h3 { font-family: "NeueHaas", sans-serif; font-weight: 400; font-size: 20px; line-height: 1; margin-bottom: 4px; color: #0a0a0e; }
    .tile p { font-size: 12px; line-height: 1.25; color: rgba(0, 0, 0, 0.55); max-width: 90%; }
    .music-controls { position: absolute; bottom: 10px; left: 10px; right: 10px; display: flex; align-items: center; gap: 8px; }
    .circle-btn {
      width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.15); color: #fff; display: grid; place-items: center; cursor: pointer;
      font-size: 10px;
    }
    .play {
      width: 28px;
      height: 28px;
      background: #fff;
      color: #1c1e2c;
      border-color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
    }
    .progress { flex: 1; height: 4px; border-radius: 999px; background: rgba(255, 255, 255, 0.2); overflow: hidden; }
    .progress > span { display: block; width: 45%; height: 100%; background: #fff; }
    .mind-guide {
      display: flex;
      align-items: flex-end;
      min-height: 126px;
      border: 9px solid rgba(0, 0, 0, 0.07);
      border-radius: 34px;
      background: none;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .mind-guide::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url(splash.jpg) center bottom / cover no-repeat;
      z-index: 0;
    }
    .mind-guide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 65%);
      z-index: 1;
    }
    .mind-guide-content {
      position: relative;
      z-index: 2;
      padding: 10px;
    }
    .mind-guide strong { display: block; font-size: 17px; font-family: "NeueHaas", sans-serif; color: #fff; }
    .reflection::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url(links/DSC04177.JPG);
      background-size: cover;
      background-position: center;
      border-radius: inherit;
      opacity: 0.55;
      pointer-events: none;
    }
    .metric-row { display: flex; gap: 10px; }
    .metric {
      flex: 1;
      min-height: 80px;
      border-radius: 16px;
      padding: 10px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 7px;
    }
    .ring {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.12);
      border-top-color: #0a0a0e;
      display: grid; place-items: center;
      font-size: 9px;
      color: rgba(0,0,0,0.7);
    }
    .metric label { font-size: 11px; color: rgba(0, 0, 0, 0.55); }
    .fab {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: fit-content;
      height: auto;
      padding: 5px 10px;
      border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(0, 0, 0, 0.10);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 12px;
    }
    .song-filter {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      transition: background 0.6s ease;
      pointer-events: none;
      z-index: 1;
    }
    .full-square {
      grid-column: 1 / -1;
      aspect-ratio: 1 / 1;
      min-height: unset;
    }
    .music-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .music-overlay.open { display: flex; }
    .music-overlay-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .music-panel {
      position: relative;
      width: 100%;
      max-height: 72%;
      border-radius: 24px;
      background: transparent;
      border: none;
      padding: 20px;
      overflow: auto;
      animation: panelIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    @keyframes panelIn {
      from { opacity: 0; transform: scale(0.94) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .music-panel-title {
      font-family: "NeueHaas", sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }
    .song-list { display: grid; gap: 6px; }
    .song-item {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.30);
      border-radius: 999px;
      color: #fff;
      padding: 10px 16px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: filter 0.18s, box-shadow 0.18s;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .song-item:hover { filter: brightness(1.18); box-shadow: 0 8px 28px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.4); }
    .song-item.active { border-color: rgba(255,255,255,0.45); filter: brightness(1.12); }
    .song-title {
      font-size: 13px;
      font-family: "NeueHaas", sans-serif;
      color: rgba(255,255,255,0.92);
    }
    .song-artist {
      margin-top: 2px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
    }
    .song-cover {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex: 0 0 auto;
    }
    .song-text { min-width: 0; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="blur"></div>
    <section class="app">
      <header class="top">
        <div class="date-chip">
          <span class="dot"></span>
          <span>18 Jan, 2026</span>
        </div>
        <button class="icon-chip" id="menuBtn" aria-label="Menú"></button>
      </header>

      <nav class="tabs">
        <button class="tab active">Your dairy</button>
        <button class="tab">Notes</button>
        <button class="tab">To Do list</button>
        <button class="tab">For anxiety</button>
      </nav>

      <h1>I’m giving my mind<br />some space... <span class="cursor">|</span></h1>

      <section class="grid">
        <article class="tile title large" id="playerCard">
          <div class="song-filter" id="songFilter"></div>
          <div class="title-large-inner">
            <div class="player-top">
              <div class="author-meta">
                <div class="author-name" id="authorName">Kendrick Lamar</div>
                <div class="author-handle" id="trackName">@allthestars</div>
              </div>
              <div class="top-actions">
                <button class="action-btn" aria-label="Share">⤴</button>
                <button class="action-btn" aria-label="Like">♥</button>
              </div>
            </div>
            <div class="player-bottom">
              <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="remainingTime">-0:00</span>
              </div>
              <div class="bar"><span id="progressFill"></span></div>
              <div class="player-controls">
                <button class="circle-btn" id="prevBtn" aria-label="Prev">⏮</button>
                <button class="circle-btn play" id="playBtn" aria-label="Play">▶</button>
                <button class="circle-btn" id="nextBtn" aria-label="Next">⏭</button>
              </div>
            </div>
          </div>
        </article>

        <a class="tile mind-guide" href="gallery.html" aria-label="Abrir galeria">
          <div class="mind-guide-content">
            <strong>Galería</strong>
          </div>
        </a>

        <div class="metric-row">
          <article class="metric">
            <div class="ring">64%</div>
            <label>Mind clarity</label>
          </article>
          <article class="metric">
            <div class="ring">15%</div>
            <label>Stress level</label>
          </article>
        </div>

        <article class="tile reflection">
          <button class="fab" aria-label="Write">Ver Viajes</button>
        </article>

        <article class="tile full-square"></article>
      </section>
    </section>

    <div class="nav-menu-backdrop" id="navBackdrop"></div>
    <nav class="nav-menu" id="navMenu">
      <div class="nav-menu-header">
        <button class="nav-close" id="navClose">×</button>
      </div>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Inicio</a>
        <a class="nav-link" href="gallery.html">Galería</a>
        <a class="nav-link" href="#">Notas</a>
        <a class="nav-link" href="#">Música</a>
      </div>
    </nav>

    <section class="music-overlay" id="musicOverlay">
      <div class="music-overlay-backdrop" id="overlayBackdrop"></div>
      <div class="music-panel">
        <h2 class="music-panel-title">Songs</h2>
        <div class="song-list" id="songList"></div>
      </div>
    </section>
  </main>
  <script>
    const menuBtn = document.getElementById("menuBtn");
    const navMenu = document.getElementById("navMenu");
    const navClose = document.getElementById("navClose");
    const navBackdrop = document.getElementById("navBackdrop");

    function openNav() {
      navMenu.classList.add("open");
      navBackdrop.classList.add("open");
    }
    function closeNav() {
      navMenu.classList.remove("open");
      navBackdrop.classList.remove("open");
    }

    menuBtn.addEventListener("click", openNav);
    navClose.addEventListener("click", closeNav);
    navBackdrop.addEventListener("click", closeNav);

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelector(".tab.active")?.classList.remove("active");
        tab.classList.add("active");
      });
    });

    const songs = [
      {
        src: "songs/All The Stars.mp3",
        title: "All The Stars",
        artist: "Kendrick Lamar",
        cover: "songs/all the stars.jpeg",
        filter: "rgba(90, 40, 180, 0.55)"
      },
      {
        src: "songs/Cinnamon Girl.mp3",
        title: "Cinnamon Girl",
        artist: "Lana Del Rey",
        cover: "songs/Cinnamon Girl.jpg",
        filter: "rgba(200, 100, 30, 0.50)"
      },
      {
        src: "songs/Say Yes To Heaven.mp3",
        title: "Say Yes To Heaven",
        artist: "Lana Del Rey",
        cover: "songs/Say Yes To Heaven.webp",
        filter: "rgba(40, 90, 210, 0.50)"
      },
      {
        src: "songs/The Cranberries - Linger.mp3",
        title: "Linger",
        artist: "The Cranberries",
        cover: "songs/Linger.jpg",
        filter: "rgba(30, 140, 80, 0.50)"
      }
    ];

    const audio = new Audio();
    let currentIndex = 0;

    const playerCard = document.getElementById("playerCard");
    const songFilter = document.getElementById("songFilter");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const currentTimeEl = document.getElementById("currentTime");
    const remainingTimeEl = document.getElementById("remainingTime");
    const progressFill = document.getElementById("progressFill");
    const authorName = document.getElementById("authorName");
    const trackName = document.getElementById("trackName");
    const musicOverlay = document.getElementById("musicOverlay");
    const overlayBackdrop = document.getElementById("overlayBackdrop");
    const songList = document.getElementById("songList");

    function extractColor(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = 20; canvas.height = 20;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, 20, 20);
            const d = ctx.getImageData(0, 0, 20, 20).data;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
            const n = d.length / 4;
            resolve(`rgba(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)},0.55)`);
          } catch (e) { resolve(null); }
        };
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${String(secs).padStart(2, "0")}`;
    }

    function loadSong(index, autoplay = false) {
      currentIndex = (index + songs.length) % songs.length;
      const song = songs[currentIndex];
      audio.src = encodeURI(song.src);
      authorName.textContent = song.artist;
      trackName.textContent = `@${song.title.toLowerCase().replace(/\s+/g, "")}`;
      playerCard.style.backgroundImage = `linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(26, 26, 30, 0.82)), url("${encodeURI(song.cover)}")`;
      songFilter.style.background = song.filter;
      currentTimeEl.textContent = "0:00";
      remainingTimeEl.textContent = "-0:00";
      progressFill.style.width = "0%";
      renderSongList();
      extractColor(encodeURI(song.cover)).then(color => {
        if (color) playerCard.style.borderColor = color;
      });
      if (autoplay) {
        audio.play().catch(() => {});
      }
      updatePlayButton();
    }

    function updatePlayButton() {
      playBtn.textContent = audio.paused ? "▶" : "⏸";
    }

    function togglePlay() {
      if (!audio.src) loadSong(currentIndex, false);
      if (audio.paused) {
        audio.play().catch(() => {});
      } else {
        audio.pause();
      }
      updatePlayButton();
    }

    function nextSong(autoplay = true) {
      loadSong(currentIndex + 1, autoplay);
    }

    function prevSong(autoplay = true) {
      loadSong(currentIndex - 1, autoplay);
    }

    function glassGradient(filterColor) {
      const m = filterColor.match(/rgba\((\d+),\s*(\d+),\s*(\d+)/);
      if (!m) return "rgba(255,255,255,0.18)";
      const [r, g, b] = m.slice(1).map(Number);
      return [
        `radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.55) 0%, transparent 60%)`,
        `radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.40) 0%, transparent 55%)`,
        `radial-gradient(ellipse at 65% 15%, rgba(${r},${g},${b},0.22) 0%, transparent 50%)`,
        `radial-gradient(ellipse at 30% 85%, rgba(${r},${g},${b},0.15) 0%, transparent 45%)`,
      ].join(", ");
    }

    function renderSongList() {
      songList.innerHTML = "";
      songs.forEach((song, index) => {
        const item = document.createElement("button");
        item.className = `song-item${index === currentIndex ? " active" : ""}`;
        item.style.background = glassGradient(song.filter);
        item.innerHTML = `<div class="song-cover" style="background-image:url('${encodeURI(song.cover)}')"></div><div class="song-text"><div class="song-title">${song.title}</div><div class="song-artist">${song.artist}</div></div>`;
        item.addEventListener("click", () => {
          loadSong(index, true);
          closeOverlay();
        });
        songList.appendChild(item);
      });
    }

    function openOverlay() {
      musicOverlay.classList.add("open");
    }

    function closeOverlay() {
      musicOverlay.classList.remove("open");
    }

    playerCard.addEventListener("click", openOverlay);
    overlayBackdrop.addEventListener("click", closeOverlay);
    playBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      togglePlay();
    });
    nextBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      nextSong(true);
    });
    prevBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      prevSong(true);
    });

    audio.addEventListener("timeupdate", () => {
      const current = audio.currentTime || 0;
      const duration = audio.duration || 0;
      currentTimeEl.textContent = formatTime(current);
      remainingTimeEl.textContent = `-${formatTime(duration - current)}`;
      const progress = duration > 0 ? (current / duration) * 100 : 0;
      progressFill.style.width = `${progress}%`;
    });
    audio.addEventListener("play", updatePlayButton);
    audio.addEventListener("pause", updatePlayButton);
    audio.addEventListener("ended", () => nextSong(true));

    loadSong(0, false);

    const mindGuideEl = document.querySelector(".mind-guide");
    extractColor("splash.jpg").then(color => {
      if (color) mindGuideEl.style.borderColor = color;
    });
  </script>
</body>
</html>
