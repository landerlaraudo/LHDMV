<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>J&L</title>
  <link rel="manifest" href="manifest.json" />
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
  <style>
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXXThin.ttf') format('truetype'); font-weight: 100; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXXThinItalic.ttf') format('truetype'); font-weight: 100; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXThin.ttf') format('truetype'); font-weight: 150; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXThinItalic.ttf') format('truetype'); font-weight: 150; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayThin.ttf') format('truetype'); font-weight: 200; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayThinItalic.ttf') format('truetype'); font-weight: 200; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayLight.ttf') format('truetype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayLightItalic.ttf') format('truetype'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayRoman.ttf') format('truetype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayRomanItalic.ttf') format('truetype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayMediu.ttf') format('truetype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayMediumItalic.ttf') format('truetype'); font-weight: 500; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBoldItalic.ttf') format('truetype'); font-weight: 700; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBlack.ttf') format('truetype'); font-weight: 900; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBlackItalic.ttf') format('truetype'); font-weight: 900; font-style: italic; }

    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Lig.otf') format('opentype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Reg.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Ita.otf') format('opentype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Med.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/Europa_Grotesk_SH_DemBol.ttf') format('truetype'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/europa-grotesk-sh-bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

    /* =====================================================
       CAMBIA AQUÍ LAS TIPOGRAFÍAS
       
       Pesos NeueHaas:  100=XXThin · 150=XThin · 200=Thin
                        300=Light · 400=Roman · 500=Medium
                        700=Bold · 900=Black
                        (todos tienen versión italic)
       Pesos Europa:    300=Light · 400=Regular · 500=Medium
                        600=DemiBold · 700=Bold · 400italic=Italic
       ===================================================== */
    :root {
      --font-title:        'NeueHaas', sans-serif;
      --font-title-weight: 100;
      --font-title-style:  italic;

      --font-label:        'Europa', sans-serif;
      --font-label-weight: 300;
      --font-label-style:  normal;

      --font-ui:           'Europa', sans-serif;
      --font-ui-weight:    400;
      --font-ui-style:     normal;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #f6f6f8;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding-top: env(safe-area-inset-top, 50px);
      padding-bottom: max(env(safe-area-inset-bottom), 40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    .splash-bg {
      position: absolute;
      inset: 0;
      background: url('splash.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    .splash-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.50) 0%,
        rgba(0,0,0,0.0) 35%,
        rgba(0,0,0,0.0) 55%,
        rgba(0,0,0,0.65) 100%
      );
    }

    .splash-top {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-top: 70px;
      animation: fadeDown 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .splash-top .label {
      font-family: var(--font-label);
      font-weight: var(--font-iu-weight);
      font-style: var(--font-label-style);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .splash-top h1 {
      font-family: var(--font-title);
      font-weight: var(--font-title-weight);
      font-style: var(--font-title-style);
      font-size: clamp(3rem, 11vw, 5rem);
      color: #fff;
      line-height: 1.05;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 40px rgba(0,0,0,0.35);
    }

    .splash-bottom {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-bottom: 10px;
      animation: fadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    .slider-hint {
      font-family: var(--font-ui);
      font-weight: var(--font-ui-weight);
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .slider-track {
      width: 230px;
      height: 58px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 29px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    .slider-track::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.07) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
    }

    .slider-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-ui);
      font-weight: var(--font-ui-weight);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .slider-thumb {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      will-change: transform;
    }

    .slider-thumb svg {
      width: 18px;
      height: 18px;
      color: #111;
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #app {
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
      height: 100%;
      width: 100%;
    }
    #app.show { opacity: 1; }
    #app iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-bg"></div>
    <div class="splash-top">
      <p class="label">desde el principio</p>
      <h1>Nuestros<br>recuerdos</h1>
    </div>
    <div class="splash-bottom">
      <p class="slider-hint">desliza para entrar</p>
      <div class="slider-track" id="sliderTrack">
        <div class="slider-label">entrar</div>
        <div class="slider-thumb" id="sliderThumb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <div id="app">
    <iframe src="index.html" title="J&L"></iframe>
  </div>

  <script>
    const track  = document.getElementById('sliderTrack');
    const thumb  = document.getElementById('sliderThumb');
    const splash = document.getElementById('splash');
    const app    = document.getElementById('app');
    const label  = track.querySelector('.slider-label');

    let dragging = false;
    let startX   = 0;
    let currentX = 0;
    let maxX     = track.clientWidth - thumb.clientWidth - 10;

    const getClientX = e => e.touches ? e.touches[0].clientX : e.clientX;

    function onStart(e) {
      dragging = true;
      startX   = getClientX(e) - currentX;
      thumb.style.transition = 'none';
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      let x = Math.max(0, Math.min(getClientX(e) - startX, maxX));
      currentX = x;
      thumb.style.transform = `translateX(${x}px)`;
      label.style.opacity   = 1 - (x / maxX) * 2;
      if (x / maxX >= 0.92) unlock();
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      if (currentX / maxX < 0.92) {
        thumb.style.transition = 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1)';
        thumb.style.transform  = 'translateX(0)';
        currentX = 0;
        label.style.opacity = 1;
      }
    }

    function unlock() {
      dragging = false;
      thumb.style.transition = 'transform 0.25s ease';
      thumb.style.transform  = `translateX(${maxX}px)`;
      setTimeout(() => {
        splash.classList.add('hide');
        app.classList.add('show');
      }, 300);
    }

    thumb.addEventListener('mousedown',  onStart);
    thumb.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('mouseup',   onEnd);
    window.addEventListener('touchend',  onEnd);
    window.addEventListener('resize', () => {
      maxX = track.clientWidth - thumb.clientWidth - 10;
    });
  </script>

</body>
</html>
