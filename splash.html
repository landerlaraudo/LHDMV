<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>J&L</title>
  <link rel="manifest" href="manifest.json" />
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
  <style>
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXXThin.ttf') format('truetype'); font-weight: 100; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXXThinItalic.ttf') format('truetype'); font-weight: 100; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXThin.ttf') format('truetype'); font-weight: 150; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayXThinItalic.ttf') format('truetype'); font-weight: 150; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayThin.ttf') format('truetype'); font-weight: 200; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayThinItalic.ttf') format('truetype'); font-weight: 200; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayLight.ttf') format('truetype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayLightItalic.ttf') format('truetype'); font-weight: 300; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayRoman.ttf') format('truetype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayRomanItalic.ttf') format('truetype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayMediu.ttf') format('truetype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayMediumItalic.ttf') format('truetype'); font-weight: 500; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBoldItalic.ttf') format('truetype'); font-weight: 700; font-style: italic; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBlack.ttf') format('truetype'); font-weight: 900; font-style: normal; }
    @font-face { font-family: 'NeueHaas'; src: url('fonts/NeueHaasDisplayBlackItalic.ttf') format('truetype'); font-weight: 900; font-style: italic; }

    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Lig.otf') format('opentype'); font-weight: 300; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Reg.otf') format('opentype'); font-weight: 400; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Ita.otf') format('opentype'); font-weight: 400; font-style: italic; }
    @font-face { font-family: 'Europa'; src: url('fonts/EuropaGroteskSH-Med.otf') format('opentype'); font-weight: 500; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/Europa_Grotesk_SH_DemBol.ttf') format('truetype'); font-weight: 600; font-style: normal; }
    @font-face { font-family: 'Europa'; src: url('fonts/europa-grotesk-sh-bold.otf') format('opentype'); font-weight: 700; font-style: normal; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: #f6f6f8;
    }

    /* ── Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    /* ── Foto full-screen ── */
    .splash-bg {
      position: absolute;
      inset: 0;
      background: url('splash.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* ── Degradado: oscurece la parte baja para legibilidad ── */
    .splash-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.0)  0%,
        rgba(0, 0, 0, 0.28) 35%,
        rgba(0, 0, 0, 0.28) 65%,
        rgba(0, 0, 0, 0.0)  100%
      );
    }

    /* ── Contenido inferior centrado ── */
    .splash-content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      padding: calc(max(env(safe-area-inset-top), 18px) + 38vh) 28px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeUp 1.3s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both;
    }

    .splash-title {
      font-family: 'NeueHaas', sans-serif;
      font-weight: 300;
      font-style: normal;
      font-size: clamp(2.9rem, 13vw, 5rem);
      color: #fff;
      line-height: 1.0;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
    }

    .splash-sub {
      font-family: 'Europa', sans-serif;
      font-weight: 300;
      font-size: 0.88rem;
      color: rgba(255, 255, 255, 0.62);
      line-height: 1.55;
      max-width: 280px;
      margin-bottom: 32px;
    }

    /* ── Botón oscuro tipo pill ── */
    .splash-btn {
      width: 280px;
      max-width: 100%;
      height: 44px;
      padding: 0 28px;
      background: rgba(16, 16, 20, 0.62);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 22px;
      color: rgba(255, 255, 255, 0.92);
      font-family: 'Europa', sans-serif;
      font-weight: 300;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-bottom: 18px;
      transition: background 0.2s, transform 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    .splash-btn:active {
      background: rgba(16, 16, 20, 0.88);
      transform: scale(0.975);
    }

    /* ── Texto legal/fecha pequeño ── */
    .splash-note {
      font-family: 'Europa', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      color: rgba(255, 255, 255, 0.32);
      letter-spacing: 0.06em;
    }

    /* ── App iframe ── */
    #app {
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
      height: 100%;
      width: 100%;
    }
    #app.show { opacity: 1; }
    #app iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="splash">
    <div class="splash-bg"></div>
    <div class="splash-overlay"></div>

    <div class="splash-content">
      <h1 class="splash-title">Nuestros<br>recuerdos</h1>
      <p class="splash-sub">Cada momento guardado<br>desde el principio</p>
      <button class="splash-btn" id="splashBtn">Entrar</button>
      <p class="splash-note" id="splashNote"></p>
    </div>
  </div>

  <div id="app">
    <iframe src="index.html" title="J&L"></iframe>
  </div>

  <script>
    // — Nota inferior con tiempo juntos —
    (function() {
      const start = new Date(2025, 11, 23);
      const now   = new Date();
      let months  = (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
      const dayStart = new Date(start.getFullYear(), start.getMonth() + months, start.getDate());
      if (dayStart > now) months--;
      const baseDate = new Date(start.getFullYear(), start.getMonth() + months, start.getDate());
      const days = Math.floor((now - baseDate) / 86400000);
      let t = '';
      if (months > 0) t += `${months} mes${months > 1 ? 'es' : ''}`;
      if (months > 0 && days > 0) t += ' y ';
      if (days > 0 || months === 0) t += `${days} día${days !== 1 ? 's' : ''}`;
      document.getElementById('splashNote').textContent = `J&L · juntos desde hace ${t}`;
    })();

    // — Botón entrar —
    const splash = document.getElementById('splash');
    const app    = document.getElementById('app');

    document.getElementById('splashBtn').addEventListener('click', () => {
      splash.classList.add('hide');
      app.classList.add('show');
    });

    // Soporte también para tap en pantalla táctil (UX alternativo)
    document.getElementById('splashBtn').addEventListener('touchend', (e) => {
      e.preventDefault();
      splash.classList.add('hide');
      app.classList.add('show');
    });
  </script>

</body>
</html>
