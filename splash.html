<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>J&L</title>
  <link rel="manifest" href="manifest.json" />
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('service-worker.js');</script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* ── SPLASH SCREEN ── */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 40px) 0 env(safe-area-inset-bottom, 40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #splash.hide {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.04);
    }

    /* Background photo */
    .splash-bg {
      position: absolute;
      inset: 0;
      background: url('splash.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Dark gradient overlay — stronger at top and bottom */
    .splash-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.55) 0%,
          rgba(0,0,0,0.0) 35%,
          rgba(0,0,0,0.0) 55%,
          rgba(0,0,0,0.65) 100%
        );
    }

    /* Top title */
    .splash-top {
      position: relative;
      z-index: 1;
      text-align: center;
      padding-top: 60px;
      animation: fadeDown 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .splash-top .label {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .splash-top h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(2.8rem, 10vw, 4.5rem);
      color: #fff;
      line-height: 1;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 30px rgba(0,0,0,0.4);
    }

    /* Bottom slider */
    .splash-bottom {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-bottom: 50px;
      animation: fadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    .slider-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    /* The slider track */
    .slider-track {
      width: 220px;
      height: 56px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 28px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    /* Shimmer animation on track */
    .slider-track::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255,255,255,0.08) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Slider label */
    .slider-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      pointer-events: none;
      transition: opacity 0.2s;
    }

    /* The draggable thumb */
    .slider-thumb {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: transform 0.1s ease;
      will-change: transform;
    }

    .slider-thumb svg {
      width: 18px;
      height: 18px;
      color: #111;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN APP ── */
    #app {
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
      height: 100%;
    }
    #app.show {
      opacity: 1;
    }

    /* Embed your index content here or use an iframe */
    #app iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <!-- ── SPLASH ── -->
  <div id="splash">
    <div class="splash-bg"></div>

    <div class="splash-top">
      <p class="label">desde el principio</p>
      <h1>nuestros<br>recuerdos</h1>
    </div>

    <div class="splash-bottom">
      <p class="slider-hint">desliza para entrar</p>
      <div class="slider-track" id="sliderTrack">
        <div class="slider-label">entrar</div>
        <div class="slider-thumb" id="sliderThumb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="app">
    <iframe src="index.html" title="J&L"></iframe>
  </div>

  <script>
    const track = document.getElementById('sliderTrack');
    const thumb = document.getElementById('sliderThumb');
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');

    const maxX = track.clientWidth - thumb.clientWidth - 10;
    let dragging = false;
    let startX = 0;
    let currentX = 0;

    function getClientX(e) {
      return e.touches ? e.touches[0].clientX : e.clientX;
    }

    function onStart(e) {
      dragging = true;
      startX = getClientX(e) - currentX;
      thumb.style.transition = 'none';
      track.style.cursor = 'grabbing';
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      let x = getClientX(e) - startX;
      x = Math.max(0, Math.min(x, maxX));
      currentX = x;
      thumb.style.transform = `translateX(${x}px)`;

      // fade out label as thumb moves
      const progress = x / maxX;
      track.querySelector('.slider-label').style.opacity = 1 - progress * 2;

      if (progress >= 0.92) unlock();
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      track.style.cursor = 'grab';
      if (currentX / maxX < 0.92) {
        // snap back
        thumb.style.transition = 'transform 0.4s cubic-bezier(0.22, 1, 0.36, 1)';
        thumb.style.transform = 'translateX(0)';
        currentX = 0;
        track.querySelector('.slider-label').style.opacity = 1;
      }
    }

    function unlock() {
      dragging = false;
      thumb.style.transition = 'transform 0.25s ease';
      thumb.style.transform = `translateX(${maxX}px)`;
      setTimeout(() => {
        splash.classList.add('hide');
        app.classList.add('show');
      }, 300);
    }

    // Mouse events
    thumb.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);

    // Touch events
    thumb.addEventListener('touchstart', onStart, { passive: true });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);

    // Recalc maxX on resize
    window.addEventListener('resize', () => {
      const newMax = track.clientWidth - thumb.clientWidth - 10;
      if (currentX > newMax) currentX = newMax;
    });
  </script>

</body>
</html>
